<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 2 - Formulario y TXT</title>

    <link rel="stylesheet" href="estilos.css">
</head>
<body class="page2-body">
    <nav class="page2-navbar">
        <a href="index.html">Página 1</a>
        <a href="pagina2.html" class="active">Página 2</a>
        <a href="pagina3.html">Página 3</a>
        <a href="pagina4.html">Página 4</a>
        <a href="pagina5.html">Página 5</a>
        <a href="pagina6.html">Página 6</a>
        <a href="pagina7.html">Página 7</a>
        <a href="pagina8.html">Página 8</a>
    </nav>
    
    <div class="page2-container">
        <h1 class="page2-h1">🔐 PÁGINA 2 - CARGA DE DATOS</h1>
        
        <div class="page2-form-section">
            <div class="page2-input-group">
                <label class="page2-label" for="email">Correo Electrónico:</label>
                <input type="email" id="email" class="page2-input" placeholder="usuario@ejemplo.com">
            </div>
            
            <div class="page2-input-group">
                <label class="page2-label" for="password">Contraseña:</label>
                <input type="password" id="password" class="page2-input" placeholder="••••••••">
            </div>
            
            <div class="page2-input-group">
                <label class="page2-label" for="txtFile">Archivo de Texto (.txt):</label>
                <input type="file" id="txtFile" class="page2-input" accept=".txt">
            </div>
            
            <button class="page2-button" onclick="procesarDatos()">Procesar Datos</button>
        </div>
        
        <div class="page2-output-section">
            <h3>📋 Consola de Salida:</h3>
            <div id="consoleOutput" class="page2-console-log">Esperando datos...</div>
            
            <h3 style="margin-top: 20px;">📄 Contenido del Archivo:</h3>
            <div id="fileContent" class="page2-file-content">No se ha cargado ningún archivo.</div>
        </div>
    </div>
    
    <script>
        function logToConsole(message, type = 'info') {
            const consoleDiv = document.getElementById('consoleOutput');
            const timestamp = new Date().toLocaleTimeString();
            const colorClass = type === 'error' ? 'page2-error' : (type === 'success' ? 'page2-success' : '');
            consoleDiv.innerHTML += `<div class="${colorClass}">[${timestamp}] ${message}</div>`;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
            
            // También log a la consola real del navegador
            console.log(`[${timestamp}] ${message}`);
        }
        
        function procesarDatos() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fileInput = document.getElementById('txtFile');
            
            // Limpiar consola anterior
            document.getElementById('consoleOutput').innerHTML = '';
            
            // Validar email
            if (!email) {
                logToConsole('ERROR: Email no proporcionado', 'error');
                return;
            }
            logToConsole(`Email capturado: ${email}`, 'success');
            
            // Validar password
            if (!password) {
                logToConsole('ERROR: Contraseña no proporcionada', 'error');
                return;
            }
            logToConsole(`Contraseña capturada: ${'*'.repeat(password.length)} (longitud: ${password.length})`, 'success');
            
            // Procesar archivo
            if (fileInput.files.length === 0) {
                logToConsole('ERROR: No se seleccionó archivo TXT', 'error');
                return;
            }
            
            const file = fileInput.files[0];
            logToConsole(`Archivo seleccionado: ${file.name} (${(file.size/1024).toFixed(2)} KB)`, 'success');
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                logToConsole('Archivo leído exitosamente', 'success');
                logToConsole(`Contenido (primeros 100 chars): ${content.substring(0, 100)}...`, 'info');
                
                // Mostrar en la página
                document.getElementById('fileContent').textContent = content;
            };
            
            reader.onerror = function() {
                logToConsole('ERROR al leer el archivo', 'error');
            };
            
            reader.readAsText(file);
        }
    </script>
</body>
</html>
