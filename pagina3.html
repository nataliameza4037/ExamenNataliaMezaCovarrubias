<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 3 - Calendario y PDF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Georgia', serif;
            background: #f5f5dc;
            background-image: 
                radial-gradient(#d4c4a8 15%, transparent 16%),
                radial-gradient(#d4c4a8 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            min-height: 100vh;
            padding: 20px;
        }
        
        .navbar {
            background: #8b4513;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .navbar a {
            color: #f5f5dc;
            text-decoration: none;
            padding: 10px 20px;
            background: #a0522d;
            border-radius: 25px;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .navbar a:hover, .navbar a.active {
            background: #cd853f;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: #8b4513;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 3px solid #d2691e;
        }
        
        .card h2 {
            color: #8b4513;
            margin-bottom: 20px;
            border-bottom: 2px solid #d2691e;
            padding-bottom: 10px;
        }
        
        .date-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        input[type="date"] {
            padding: 15px;
            font-size: 1.2em;
            border: 2px solid #8b4513;
            border-radius: 10px;
            color: #8b4513;
            font-family: inherit;
        }
        
        .date-display {
            font-size: 1.5em;
            color: #a0522d;
            font-weight: bold;
            padding: 20px;
            background: #f5f5dc;
            border-radius: 10px;
            border: 2px dashed #d2691e;
        }
        
        .pdf-section {
            text-align: center;
        }
        
        input[type="file"] {
            padding: 15px;
            border: 2px dashed #8b4513;
            border-radius: 10px;
            width: 100%;
            margin-bottom: 20px;
        }
        
        .pdf-viewer {
            width: 100%;
            height: 600px;
            border: 3px solid #8b4513;
            border-radius: 10px;
            display: none;
        }
        
        .pdf-viewer.active {
            display: block;
        }
        
        .no-pdf {
            padding: 60px;
            background: #f5f5dc;
            border-radius: 10px;
            color: #8b4513;
            font-style: italic;
        }
        
        .btn {
            background: #8b4513;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #a0522d;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html">Página 1</a>
        <a href="pagina2.html">Página 2</a>
        <a href="pagina3.html" class="active">Página 3</a>
        <a href="pagina4.html">Página 4</a>
        <a href="pagina5.html">Página 5</a>
        <a href="pagina6.html">Página 6</a>
        <a href="pagina7.html">Página 7</a>
        <a href="pagina8.html">Página 8</a>
    </nav>
    
    <div class="container">
        <h1>📅 PÁGINA 3 - FECHAS Y DOCUMENTOS</h1>
        
        <div class="card">
            <h2>🗓️ Selector de Fecha</h2>
            <div class="date-section">
                <input type="date" id="fechaSelector" onchange="mostrarFecha()">
                <div id="fechaDisplay" class="date-display">Selecciona una fecha</div>
            </div>
        </div>
        
        <div class="card">
            <h2>📄 Visor de PDF</h2>
            <div class="pdf-section">
                <input type="file" id="pdfInput" accept=".pdf" onchange="cargarPDF()">
                <div id="noPdfMsg" class="no-pdf">No se ha seleccionado ningún PDF</div>
                <iframe id="pdfViewer" class="pdf-viewer"></iframe>
            </div>
        </div>
    </div>
    
    <script>
        function mostrarFecha() {
            const fecha = document.getElementById('fechaSelector').value;
            const display = document.getElementById('fechaDisplay');
            
            if (fecha) {
                const fechaObj = new Date(fecha);
                const opciones = { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                };
                display.textContent = fechaObj.toLocaleDateString('es-ES', opciones);
                console.log('Fecha seleccionada:', fecha);
            } else {
                display.textContent = 'Selecciona una fecha';
            }
        }
        
        function cargarPDF() {
            const input = document.getElementById('pdfInput');
            const viewer = document.getElementById('pdfViewer');
            const noPdfMsg = document.getElementById('noPdfMsg');
            
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const fileURL = URL.createObjectURL(file);
                
                viewer.src = fileURL;
                viewer.classList.add('active');
                noPdfMsg.style.display = 'none';
                
                console.log('PDF cargado:', file.name);
            } else {
                viewer.classList.remove('active');
                noPdfMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
